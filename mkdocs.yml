site_name: "Super Individuals CIC"
site_url: "https://community.sicic.org"
site_description: "A public-interest community for helping domain experts build domain-specific AI agents"

theme:
  name: material
  custom_dir: overrides
  logo: assets/si-logo.png
  favicon: assets/si-logo.png
  font:
    text: DM Sans
    code: IBM Plex Mono
  palette:
    primary: black
    accent: amber
  features:
    - navigation.top
    - navigation.sections
    - toc.integrate
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - macros

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_templates:
  - robots.txt

extra_css:
  - stylesheets/extra.css

not_in_nav: |
  partners.md
  cohort/index.md
  cohort/intro-batch-1.md
  cohort/goldfield-zeroclaw.md
  cohort/patricio-zeroclaw.md
  cohort/shu-hackstudio-pro.md
  cohort/tuo-paper-party.md
  cohort/venkatesan-zeroclaw.md
  cohort/palma-zeroclaw.md
  cohort/chikeka-bricolage.md
  cohort/loio-zeroclaw.md
  cohort/luzuka-chip.md
  cohort/linton-zeroclaw.md
  cohort/ripa-fanepath.md
  cohort/kumar-newsaware.md
  cohort/shardlow-agents.md
  cohort/erlingsson-agent-character.md
  cohort/simsek-task-agent.md
  cohort/pope-finance-lab.md
  cohort/tozija-profile.md
  privacy-policy.md
  refund-policy.md
  terms-of-service.md

nav:
  - Home: index.md
  - About: about.md
  - Community: community.md
  - Workshops:
      - Intro track: workshops.md
      - Builder track: builder-track.md
  - For Teams: teams.md
  - Contact: contact.md

extra:
  # --- Single source of truth for facts shown across pages (do not hardcode these elsewhere) ---
  founding_total: 31            # total founding-cohort places
  cpd_membership_no: "22924"    # The CPD Certification Service membership number
  cpd_courses_accredited: false # GUARD: flip to true ONLY after individual course tracks pass CPD review
  price_referral: "GBP 86"      # Co-Founding / referral intro-track price
  price_alumni: "GBP 139"       # alumni-network referral intro-track price
  price_standard: "GBP 199"     # standard intro-track price
  scoping_cta: "mailto:publication@sicic.org?subject=Scoping%20call%20request%20%E2%80%94%20For%20Teams"
  analytics:
    provider: google
    property: G-TXWEDLJP1D
  social:
    # - icon: fontawesome/brands/github
    #   link: https://github.com/sicic-org
    - icon: material/linkedin
      link: https://www.linkedin.com/company/super-individual-cic
    - icon: material/email
      link: mailto:publication@sicic.org
